<!-- M4: Sproglig mikrotest / simple button version -->
<section id="m4-simple-language-test">
  <style>
    #m4-simple-language-test {
      --m4-red: #ef4b45;
      --m4-red-dark: #c93631;
      --m4-text: #1f2a2e;
      --m4-muted: #6c7175;
      --m4-line: rgba(239, 75, 69, 0.55);
      --m4-soft-line: rgba(239, 75, 69, 0.22);
      --m4-bg: #ffffff;
      --m4-soft: #fff7f6;

      max-width: 1060px;
      margin: 0 auto;
      padding: 44px 18px 70px;
      background: var(--m4-bg);
      color: var(--m4-text);
      font-family: Georgia, "Times New Roman", serif;
    }

    #m4-simple-language-test * {
      box-sizing: border-box;
    }

    .m4-hero {
      max-width: 680px;
      margin: 40px auto 90px;
      padding-left: 4px;
    }

    .m4-hero h2 {
      margin: 0;
      color: var(--m4-red);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(2.1rem, 5vw, 4.1rem);
      font-weight: 400;
      letter-spacing: -0.055em;
      line-height: 1;
    }

    .m4-hero p {
      margin: 22px 0 0;
      color: var(--m4-red);
      font-size: 1.15rem;
      line-height: 1.35;
      max-width: 560px;
    }

    .m4-rule {
      border-top: 1px solid var(--m4-line);
      margin: 0 -18px 46px;
    }

    .m4-controls {
      max-width: 860px;
      margin: 0 auto 36px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 22px;
      border-bottom: 1px solid var(--m4-soft-line);
      padding-bottom: 24px;
    }

    .m4-controls-title {
      color: var(--m4-red);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }

    .m4-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .m4-actions button,
    .m4-choice {
      appearance: none;
      border: 1px solid var(--m4-line);
      background: #fff;
      color: var(--m4-red-dark);
      padding: 8px 11px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0;
    }

    .m4-actions button:hover,
    .m4-choice:hover {
      background: var(--m4-soft);
    }

    .m4-actions button.primary {
      background: var(--m4-red);
      color: #fff;
      border-color: var(--m4-red);
    }

    .m4-actions button.primary:hover {
      background: var(--m4-red-dark);
    }

    .m4-status {
      flex-basis: 100%;
      color: var(--m4-muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.82rem;
      margin-top: 4px;
    }

    .m4-meta {
      max-width: 860px;
      margin: 0 auto 44px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 22px;
    }

    .m4-meta-title {
      color: var(--m4-red);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }

    .m4-meta-fields {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .m4-field label,
    .m4-comment label {
      display: block;
      margin-bottom: 6px;
      color: var(--m4-muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .m4-field input,
    .m4-comment textarea {
      width: 100%;
      border: 1px solid var(--m4-soft-line);
      border-bottom: 1px solid var(--m4-line);
      background: #fff;
      color: var(--m4-text);
      padding: 9px 8px;
      border-radius: 0;
      font: inherit;
      outline: none;
    }

    .m4-field input {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
    }

    .m4-comment textarea {
      min-height: 72px;
      resize: vertical;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .m4-field input:focus,
    .m4-comment textarea:focus {
      border-color: var(--m4-red);
      box-shadow: 0 1px 0 var(--m4-red);
    }

    .m4-list {
      max-width: 860px;
      margin: 0 auto;
    }

    .m4-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 22px;
      padding: 28px 0;
      border-top: 1px solid var(--m4-soft-line);
    }

    .m4-row:last-child {
      border-bottom: 1px solid var(--m4-soft-line);
    }

    .m4-left {
      color: var(--m4-red);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .m4-id {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .m4-context {
      margin-top: 8px;
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--m4-red);
      opacity: 0.8;
    }

    .m4-text-main {
      font-size: clamp(1.25rem, 2.4vw, 1.65rem);
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .m4-translations {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 14px 0 18px;
      color: var(--m4-muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .m4-translation {
      border-left: 1px solid var(--m4-soft-line);
      padding-left: 12px;
    }

    .m4-translation strong {
      display: block;
      color: var(--m4-red);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .m4-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 10px 0 14px;
    }

    .m4-choice.active {
      background: var(--m4-red);
      color: #fff;
      border-color: var(--m4-red);
    }

    .m4-footer-note {
      max-width: 860px;
      margin: 34px auto 0;
      color: var(--m4-muted);
      font-size: 0.95rem;
      line-height: 1.45;
      border-top: 1px solid var(--m4-line);
      padding-top: 18px;
    }

    @media (max-width: 760px) {
      #m4-simple-language-test {
        padding-top: 20px;
      }

      .m4-hero {
        margin: 24px 0 54px;
      }

      .m4-controls,
      .m4-meta,
      .m4-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .m4-meta-fields,
      .m4-translations {
        grid-template-columns: 1fr;
      }

      .m4-row {
        padding: 24px 0;
      }
    }
  </style>

  <div class="m4-hero">
    <h2>M4 · Orð og tónalag</h2>
    <p>
      Ein lítil málslig meting av tekstunum til QR-plakat og QR-síðu.
      Vel tað, sum hóskar best, og skriva viðmerking um tú vilt.
    </p>
  </div>

  <div class="m4-rule"></div>

  <div class="m4-controls">
    <div class="m4-controls-title">Export</div>
    <div class="m4-actions">
      <button class="primary" type="button" onclick="m4Save()">Gem lokalt</button>
      <button type="button" onclick="m4DownloadCSV()">Download CSV</button>
      <button type="button" onclick="m4DownloadJSON()">Download JSON</button>
      <button type="button" onclick="m4Clear()">Nulstil</button>
      <div class="m4-status" id="m4-status">Ikke gemt endnu</div>
    </div>
  </div>

  <div class="m4-meta">
    <div class="m4-meta-title">Info</div>
    <div class="m4-meta-fields">
      <div class="m4-field">
        <label for="m4-reviewer">Navn / rolle</label>
        <input id="m4-reviewer" type="text" placeholder="Fx sprogfaglig person">

      <div class="m4-field">
        <label for="m4-focus">Sprogblik</label>

    </div>
  </div>

  <div class="m4-list" id="m4-list"></div>

  <div class="m4-footer-note">
    Kommentarerne gemmes kun lokalt i browseren. Download derfor CSV eller JSON, når vurderingen er færdig.

    function m4EscapeHTML(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function m4Today() {
      return new Date().toISOString().slice(0, 10);
    }

    function m4Render() {
      const list = document.getElementById("m4-list");

      list.innerHTML = m4Sentences.map(item => `
        <article class="m4-row" data-id="${item.id}">
          <div class="m4-left">
            <div class="m4-id">${item.id}</div>
            <div class="m4-context">${m4EscapeHTML(item.context)}</div>
          </div>

          <div class="m4-right">
            <div class="m4-text-main">${m4EscapeHTML(item.da)}</div>

            <div class="m4-translations">
              <div class="m4-translation">
                <strong>Føroyskt</strong>
                ${m4EscapeHTML(item.fo)}
              </div>

              <div class="m4-translation">
                <strong>Deutsch</strong>
                ${m4EscapeHTML(item.de)}
              </div>
            </div>

            <div class="m4-buttons">
              ${m4Choices.map(choice => `
                <button class="m4-choice" type="button" data-choice="${m4EscapeHTML(choice)}">
                  ${m4EscapeHTML(choice)}
                </button>
              `).join("")}
            </div>

            <div class="m4-comment">
              <label for="${item.id}-comment">Viðmerking / forslag</label>
              <textarea id="${item.id}-comment" data-comment placeholder="Skriva viðmerking her, um tú vilt."></textarea>
            </div>
          </div>
        </article>
      `).join("");

      document.getElementById("m4-date").value = m4Today();

      document.querySelectorAll(".m4-choice").forEach(btn => {
        btn.addEventListener("click", function () {
          btn.classList.toggle("active");
          m4AutoSave();
        });
      });

      document.querySelectorAll("#m4-simple-language-test textarea, #m4-simple-language-test input")
        .forEach(el => {
          el.addEventListener("input", m4AutoSave);
          el.addEventListener("change", m4AutoSave);
        });

      m4Load();
    }

    function m4Collect() {
      return {
        project: "M4 – enkel sproglig mikrotest",
        savedAt: new Date().toISOString(),
        reviewer: document.getElementById("m4-reviewer").value || "",
        date: document.getElementById("m4-date").value || "",
        focus: document.getElementById("m4-focus").value || "",
        items: m4Sentences.map(item => {
          const row = document.querySelector(`[data-id="${item.id}"]`);
          const selected = Array.from(row.querySelectorAll(".m4-choice.active")).map(btn => btn.dataset.choice);

          return {
            id: item.id,
            context: item.context,
            danish: item.da,
            faroese: item.fo,
            german: item.de,
            selected: selected,
            comment: row.querySelector("[data-comment]").value || ""
          };
        })
      };
    }

    function m4Save() {
      const data = m4Collect();
      localStorage.setItem(m4StorageKey, JSON.stringify(data));
      document.getElementById("m4-status").textContent = "Gemt lokalt " + new Date().toLocaleTimeString("da-DK");
    }

    let m4Timer = null;
    function m4AutoSave() {
      clearTimeout(m4Timer);
      m4Timer = setTimeout(m4Save, 400);
    }

    function m4Load() {
      const raw = localStorage.getItem(m4StorageKey);
      if (!raw) return;

      try {
        const data = JSON.parse(raw);

        document.getElementById("m4-reviewer").value = data.reviewer || "";
        document.getElementById("m4-date").value = data.date || m4Today();
        document.getElementById("m4-focus").value = data.focus || "";

        (data.items || []).forEach(saved => {
          const row = document.querySelector(`[data-id="${saved.id}"]`);
          if (!row) return;

          row.querySelector("[data-comment]").value = saved.comment || "";

          row.querySelectorAll(".m4-choice").forEach(btn => {
            if ((saved.selected || []).includes(btn.dataset.choice)) {
              btn.classList.add("active");
            }
          });
        });

        document.getElementById("m4-status").textContent = "Tidligere lokal gemning indlæst";
      } catch (e) {
        document.getElementById("m4-status").textContent = "Kunne ikke indlæse lokal gemning";
      }
    }

    function m4Download(filename, content, type) {
      const blob = new Blob([content], { type: type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function m4DownloadJSON() {
      const data = m4Collect();
      const name = "M4-ordtest-A-handil-" + (data.date || m4Today()) + ".json";
      m4Download(name, JSON.stringify(data, null, 2), "application/json;charset=utf-8");
    }

    function m4CSVCell(value) {
      const v = Array.isArray(value) ? value.join(", ") : String(value || "");
      return '"' + v.replaceAll('"', '""') + '"';
    }

    function m4DownloadCSV() {
      const data = m4Collect();

      const rows = [
        [
          "id",
          "context",
          "danish",
          "faroese",
          "german",
          "selected",
          "comment",
          "reviewer",
          "date",
          "focus"
        ]
      ];

      data.items.forEach(item => {
        rows.push([
          item.id,
          item.context,
          item.danish,
          item.faroese,
          item.german,
          item.selected,
          item.comment,
          data.reviewer,
          data.date,
          data.focus
        ]);
      });

      const csv = rows.map(row => row.map(m4CSVCell).join(";")).join("\n");
      const name = "M4-ordtest-A-handil-" + (data.date || m4Today()) + ".csv";
      m4Download(name, csv, "text/csv;charset=utf-8");
    }

    function m4Clear() {
      const ok = confirm("Vil du nulstille alle lokale svar?");
      if (!ok) return;

      localStorage.removeItem(m4StorageKey);

      document.querySelectorAll(".m4-choice.active").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll("[data-comment]").forEach(area => area.value = "");
      document.getElementById("m4-reviewer").value = "";
      document.getElementById("m4-focus").value = "";
      document.getElementById("m4-date").value = m4Today();
      document.getElementById("m4-status").textContent = "Nulstillet";
    }

    m4Render();
  </script>
</section>
