<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Á handil · Designmodul</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.min.js"></script>

  <style>
    :root {
      --sidebar: #101318;
      --sidebar-2: #171b22;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-soft: #fafbfc;
      --line: #dfe3e8;
      --line-strong: #c9d0d8;
      --text: #1f2933;
      --muted: #697386;
      --green: #65c94a;
      --green-dark: #2e7d32;
      --blue: #3366ff;
      --orange: #ffb020;
      --red: #df4b4b;
      --radius: 10px;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
      font-family: Inter, "Open Sans", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, "Open Sans", Arial, sans-serif;
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button, select, input { min-height: 36px; }

    button {
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      padding: 8px 12px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
    }

    button:hover {
      background: #f8fafc;
      border-color: #aeb7c2;
    }

    button.ghost-dark {
      background: transparent;
      color: #c8d0dc;
      border-color: rgba(255,255,255,0.14);
    }

    button.ghost-dark:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    a {
      color: var(--blue);
      font-weight: 800;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
      color: #fff;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: start;
      padding: 14px 10px;
      gap: 18px;
      z-index: 50;
    }

    .logo-button {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.24);
      overflow: hidden;
      margin: 0 auto;
    }

    .logo-button img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    .side-actions {
      display: grid;
      gap: 10px;
    }

    .side-button {
      width: 54px;
      min-height: 54px;
      display: grid;
      place-items: center;
      gap: 2px;
      padding: 7px 5px;
      border-radius: 12px;
      font-size: 10px;
      line-height: 1.05;
      text-align: center;
      font-weight: 800;
    }

    .side-button .icon {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .progress-tile {
      width: 54px;
      padding: 8px 5px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: #fff;
      text-align: center;
    }

    .progress-tile strong {
      display: block;
      font-size: 17px;
    }

    .progress-tile span {
      display: block;
      margin-top: 2px;
      color: #bac4d2;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .main { min-width: 0; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .project-header {
      min-height: 68px;
      padding: 14px 22px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
    }

    .breadcrumbs {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .project-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .project-title h1 {
      margin: 0;
      font-size: 19px;
      letter-spacing: -0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      background: #eef8eb;
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 800;
    }

    .project-link { white-space: nowrap; }

    .filterbar {
      padding: 12px 22px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .filter-left,
    .filter-right {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .filter-right { justify-content: end; }

    input[type="search"], select {
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      padding: 7px 10px;
      font-weight: 600;
    }

    input[type="search"] {
      width: min(430px, 100%);
    }

    .content {
      padding: 18px 22px 36px;
    }

    .language-strip {
      margin-bottom: 14px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .language-strip-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .language-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .language-checks label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
    }

    .language-checks input {
      accent-color: var(--blue);
    }

    .stats-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .stat-pill {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 6px 10px;
    }

    .stat-pill strong { color: var(--text); }

    .editor-list {
      display: grid;
      gap: 10px;
    }

    .key-row {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(17, 24, 39, 0.04);
      overflow: hidden;
    }

    .key-head {
      min-height: 44px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      background: var(--panel-soft);
      border-bottom: 1px solid var(--line);
    }

    .key-name {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .key-name code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #26384d;
      background: #eef2f7;
      border: 1px solid #d9e0e8;
      border-radius: 6px;
      padding: 3px 6px;
      overflow-wrap: anywhere;
    }

    .category {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .context {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .row-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tiny-button {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 12px;
      box-shadow: none;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--orange);
    }

    .key-row[data-status="approved"] .status-dot {
      background: var(--green);
    }

    .key-row[data-has-comment="true"] .status-dot {
      box-shadow: 0 0 0 3px rgba(255, 176, 32, 0.18);
    }

    .translation-grid {
      display: grid;
      grid-template-columns: repeat(var(--visible-count, 2), minmax(260px, 1fr));
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .translation-cell {
      min-width: 260px;
      border-right: 1px solid var(--line);
      background: #fff;
    }

    .translation-cell:last-child { border-right: 0; }

    .cell-head {
      min-height: 38px;
      padding: 9px 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .source-text {
      min-height: 46px;
      padding: 10px 12px;
      color: var(--muted);
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      line-height: 1.45;
      white-space: pre-wrap;
    }

    textarea.translation-input {
      display: block;
      width: 100%;
      min-height: 94px;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 12px;
      color: var(--text);
      background: #fff;
      line-height: 1.5;
      font-weight: 500;
    }

    textarea.translation-input:focus {
      box-shadow: inset 0 0 0 2px rgba(51, 102, 255, 0.22);
    }

    .comment-row {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 12px;
      padding: 10px 12px;
      background: #fff;
    }

    .comment-label strong {
      display: block;
      font-size: 12px;
    }

    .comment-label span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .comment-row textarea {
      min-height: 48px;
      resize: vertical;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      padding: 8px 10px;
      outline: 0;
    }

    .comment-row textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(51,102,255,0.12);
    }

    .empty {
      display: none;
      padding: 36px;
      text-align: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      font-weight: 800;
    }

    .empty.visible { display: block; }

    .progress-panel {
      width: min(440px, calc(100vw - 40px));
      position: fixed;
      left: 86px;
      bottom: 18px;
      z-index: 80;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(17,24,39,0.22);
      padding: 16px;
      display: none;
    }

    .progress-panel.visible {
      display: grid;
      gap: 12px;
    }

    .progress-panel h2 {
      margin: 0;
      font-size: 18px;
    }

    .progress-bar {
      height: 12px;
      background: #edf1f5;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 999px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .progress-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fafbfc;
    }

    .progress-card strong {
      display: block;
      font-size: 20px;
    }

    .progress-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; }

      .sidebar {
        position: sticky;
        top: 0;
        height: auto;
        grid-template-columns: auto 1fr auto;
        grid-template-rows: auto;
        align-items: center;
        padding: 8px 10px;
      }

      .side-actions {
        grid-auto-flow: column;
        overflow-x: auto;
      }

      .side-button,
      .progress-tile {
        width: auto;
        min-width: 58px;
      }

      .filterbar { grid-template-columns: 1fr; }
      .filter-right { justify-content: start; }

      .project-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .translation-grid { grid-template-columns: 1fr; }

      .translation-cell {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .comment-row { grid-template-columns: 1fr; }

      .progress-panel {
        left: 10px;
        bottom: 10px;
      }
    }

    @media print {
      .sidebar,
      .topbar,
      .language-strip,
      .comment-row,
      .row-actions {
        display: none;
      }

      .app-shell { display: block; }
      .content { padding: 0; }

      .key-row {
        break-inside: avoid;
        box-shadow: none;
      }

      body { background: white; }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Værktøjer">
      <div class="logo-button" title="Á handil">
        <img src="https://itdd.au.dk/single-user-mode/wp-content/uploads/sites/103/2026/05/a_logo.png" alt="Á handil logo">
      </div>

      <div class="side-actions">
        <button class="side-button ghost-dark" type="button" id="excelButton">
          <span class="icon">↓</span>Excel
        </button>

        <button class="side-button ghost-dark" type="button" id="pdfButton">
          <span class="icon">↓</span>PDF
        </button>

        <button class="side-button ghost-dark" type="button" id="saveButton">
          <span class="icon">✓</span>Gem
        </button>

        <button class="side-button ghost-dark" type="button" id="resetButton">
          <span class="icon">↺</span>Reset
        </button>

        <button class="side-button ghost-dark" type="button" id="progressButton">
          <span class="icon">◷</span>Status
        </button>
      </div>

      <div class="progress-tile" title="Godkendt">
        <strong id="sidePercent">0%</strong>
        <span>done</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="project-header">
          <div>
            <div class="breadcrumbs">Projects — Á handil í Vestmanna</div>

            <div class="project-title">
              <h1>Translation cockpit</h1>
              <span class="badge">Designmodul</span>
            </div>
          </div>

          <a class="project-link" href="https://itdd.au.dk/single-user-mode/prototyper/" target="_blank" rel="noopener">
            Um verkætlanina
          </a>
        </div>

        <div class="filterbar">
          <div class="filter-left">
            <input id="searchInput" type="search" placeholder="Search keys, translations, comments…" />

            <select id="statusFilter" aria-label="Filtrér efter status">
              <option value="all">All statuses</option>
              <option value="needs-review">Needs review</option>
              <option value="approved">Approved</option>
              <option value="issue">Has comment</option>
            </select>
          </div>

          <div class="filter-right">
            <button type="button" id="clearSearchButton">Clear search</button>
          </div>
        </div>
      </header>

      <section class="content">
        <section class="language-strip" aria-label="Synlige sprog">
          <div class="language-strip-title">Choose languages</div>
          <div id="languageChecks" class="language-checks"></div>
        </section>

        <section class="stats-line" aria-live="polite">
          <span class="stat-pill"><strong id="countVisible">0</strong> visible keys</span>
          <span class="stat-pill"><strong id="countApproved">0</strong> approved</span>
          <span class="stat-pill"><strong id="countIssues">0</strong> with comments</span>
          <span class="stat-pill"><strong id="countLanguages">0</strong> languages</span>
          <span class="stat-pill"><strong id="countTotal">0</strong> total</span>
        </section>

        <section id="strings" class="editor-list"></section>
        <section id="empty" class="empty">No keys match the current filter.</section>
      </section>
    </main>
  </div>

  <aside id="progressPanel" class="progress-panel" aria-live="polite">
    <div style="display:flex; justify-content:space-between; gap:12px; align-items:center;">
      <h2>Review progress</h2>
      <button type="button" class="tiny-button" id="closeProgress">Close</button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="progress-grid">
      <div class="progress-card">
        <strong id="progressApproved">0</strong>
        <span>approved</span>
      </div>

      <div class="progress-card">
        <strong id="progressLeft">0</strong>
        <span>left</span>
      </div>

      <div class="progress-card">
        <strong id="progressWordsLeft">0</strong>
        <span>words left</span>
      </div>
    </div>
  </aside>

    const sourceStrings = Object.keys(translations.da).map((key) => {
      const [category, context] = contexts[key] || ["other", key];

      return {
        key,
        category,
        context,
        text: Object.fromEntries(
          languages.map(language => [
            language.code,
            translations[language.code]?.[key] || ""
          ])
        )
      };
    });

    const byId = (id) => document.getElementById(id);
    const cloneData = (value) => JSON.parse(JSON.stringify(value));
    const validCodes = () => languages.map(language => language.code);

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function wordCount(value) {
      return String(value || "")
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .length;
    }

    function languageByCode(code) {
      return languages.find(language => language.code === code);
    }

    function normalizeSettings(settings = {}) {
      const codes = validCodes();

      let visibleLanguages = Array.from(
        new Set(settings.visibleLanguages || ["da", "fo"])
      ).filter(code => codes.includes(code));

      if (!visibleLanguages.length) {
        visibleLanguages = ["da"];
      }

      return { visibleLanguages };
    }

    function mergeSavedData(savedRows) {
      return sourceStrings.map(source => {
        const saved = Array.isArray(savedRows)
          ? savedRows.find(row => row.key === source.key)
          : null;

        return {
          ...cloneData(source),
          status: saved?.status || "needs-review",
          comment: saved?.comment || "",
          edited: {
            ...cloneData(source.text),
            ...(saved?.edited || {})
          }
        };
      });
    }

    function getFreshData() {
      return sourceStrings.map(item => ({
        ...cloneData(item),
        status: "needs-review",
        comment: "",
        edited: cloneData(item.text)
      }));
    }

    function getInitialData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (saved) return mergeSavedData(saved);
      } catch (error) {
        console.warn("Could not read saved data", error);
      }

      return getFreshData();
    }

    function getInitialSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "null");
        if (saved) return normalizeSettings(saved);
      } catch (error) {
        console.warn("Could not read saved settings", error);
      }

      return normalizeSettings();
    }

    let data = getInitialData();
    let settings = getInitialSettings();

    const stringsEl = byId("strings");
    const emptyEl = byId("empty");
    const languageChecks = byId("languageChecks");
    const searchInput = byId("searchInput");
    const statusFilter = byId("statusFilter");

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function getChosenLanguages() {
      settings = normalizeSettings(settings);

      return settings.visibleLanguages
        .map(code => languageByCode(code))
        .filter(Boolean);
    }

    function renderLanguageControls() {
      settings = normalizeSettings(settings);

      languageChecks.innerHTML = languages.map(language => {
        const checked = settings.visibleLanguages.includes(language.code)
          ? "checked"
          : "";

        return `
          <label>
            <input type="checkbox" value="${escapeHtml(language.code)}" ${checked}>
            ${escapeHtml(language.label)}
          </label>
        `;
      }).join("");
    }

    function getFilteredData() {
      const query = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      const chosenLanguages = getChosenLanguages();

      return data.filter(item => {
        const statusMatch =
          status === "all" ||
          item.status === status ||
          (status === "issue" && item.comment.trim());

        const haystack = [
          item.key,
          item.context,
          item.category,
          item.comment
        ];

        chosenLanguages.forEach(language => {
          haystack.push(
            item.text[language.code] || "",
            item.edited[language.code] || ""
          );
        });

        return statusMatch &&
          (!query || haystack.join(" ").toLowerCase().includes(query));
      });
    }

    function render() {
      renderLanguageControls();

      const filtered = getFilteredData();
      const visibleLanguages = getChosenLanguages();

      stringsEl.style.setProperty(
        "--visible-count",
        String(Math.max(visibleLanguages.length, 1))
      );

      stringsEl.innerHTML = filtered.map(item => {
        const index = data.findIndex(row => row.key === item.key);
        const hasComment = Boolean(item.comment.trim());

        return `
          <article class="key-row" data-status="${escapeHtml(item.status)}" data-has-comment="${hasComment}">
            <header class="key-head">
              <div class="key-name">
                <span class="status-dot" aria-hidden="true"></span>
                <code>${escapeHtml(item.key)}</code>
                <span class="category">${escapeHtml(item.category)}</span>
                <span class="context">${escapeHtml(item.context)}</span>
              </div>

              <div class="row-actions">
                <button type="button" class="tiny-button" data-action="toggle-status" data-index="${index}">
                  ${item.status === "approved" ? "Approved" : "Approve"}
                </button>
              </div>
            </header>

            <div class="translation-grid">
              ${visibleLanguages.map(language => `
                <section class="translation-cell">
                  <div class="cell-head">
                    <span>${escapeHtml(language.label)}</span>
                    <span>${escapeHtml(language.code.toUpperCase())}</span>
                  </div>

                  <div class="source-text">${escapeHtml(item.text[language.code])}</div>

                  <textarea
                    class="translation-input"
                    data-action="edit"
                    data-index="${index}"
                    data-lang="${language.code}"
                    aria-label="Edit ${escapeHtml(language.label)} for ${escapeHtml(item.key)}"
                  >${escapeHtml(item.edited[language.code])}</textarea>
                </section>
              `).join("")}
            </div>

            <footer class="comment-row">
              <div class="comment-label">
                <strong>Comment</strong>
                <span>Notes, wording issues or approval context.</span>
              </div>

              <textarea
                data-action="comment"
                data-index="${index}"
                aria-label="Comment for ${escapeHtml(item.key)}"
              >${escapeHtml(item.comment)}</textarea>
            </footer>
          </article>
        `;
      }).join("");

      emptyEl.classList.toggle("visible", filtered.length === 0);
      updateCounts(filtered.length, visibleLanguages.length);
    }

    function updateCounts(
      visibleCount = getFilteredData().length,
      languageCount = getChosenLanguages().length
    ) {
      const total = data.length;
      const approved = data.filter(item => item.status === "approved").length;
      const issues = data.filter(item => item.comment.trim()).length;
      const left = total - approved;
      const percent = total ? Math.round((approved / total) * 100) : 0;

      const wordsLeft = data
        .filter(item => item.status !== "approved")
        .reduce((sum, item) => {
          return sum + getChosenLanguages().reduce((langSum, language) => {
            return langSum + wordCount(item.edited[language.code]);
          }, 0);
        }, 0);

      byId("countVisible").textContent = visibleCount;
      byId("countApproved").textContent = approved;
      byId("countIssues").textContent = issues;
      byId("countLanguages").textContent = languageCount;
      byId("countTotal").textContent = total;
      byId("sidePercent").textContent = `${percent}%`;

      byId("progressApproved").textContent = approved;
      byId("progressLeft").textContent = left;
      byId("progressWordsLeft").textContent = wordsLeft;
      byId("progressFill").style.width = `${percent}%`;
    }

    function rowsForExport() {
      const chosenLanguages = getChosenLanguages();

      return data.map(item => {
        const row = {
          key: item.key,
          category: item.category,
          context: item.context,
          status: item.status,
          comment: item.comment
        };

        chosenLanguages.forEach(language => {
          row[`${language.code}_language`] = language.label;
          row[`${language.code}_original`] = item.text[language.code] || "";
          row[`${language.code}_reviewed`] = item.edited[language.code] || "";
        });

        return row;
      });
    }

    function downloadExcel() {
      const worksheet = XLSX.utils.json_to_sheet(rowsForExport());
      const workbook = XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(workbook, worksheet, "Designmodul");
      XLSX.writeFile(workbook, "ahandil-designmodul.xlsx");
    }

    function downloadPdf() {
      const chosenLanguages = getChosenLanguages();

      const headers = [
        { text: "Key", bold: true },
        { text: "Category", bold: true },
        { text: "Status", bold: true },
        { text: "Comment", bold: true },
        ...chosenLanguages.map(language => ({
          text: language.label,
          bold: true
        }))
      ];

      const body = [
        headers,
        ...data.map(item => [
          item.key,
          item.category,
          item.status,
          item.comment || "",
          ...chosenLanguages.map(language => item.edited[language.code] || "")
        ])
      ];

      const docDefinition = {
        pageOrientation: "landscape",
        pageSize: "A4",
        pageMargins: [22, 26, 22, 26],
        defaultStyle: {
          font: "Roboto",
          fontSize: chosenLanguages.length >= 5 ? 5.7 : 6.4
        },
        content: [
          {
            text: "Á handil · Designmodul",
            fontSize: 16,
            bold: true,
            margin: [0, 0, 0, 4]
          },
          {
            text: `Languages: ${chosenLanguages.map(language => language.label).join(", ")}`,
            fontSize: 8,
            margin: [0, 0, 0, 12]
          },
          {
            table: {
              headerRows: 1,
              widths: [58, 50, 48, 90, ...chosenLanguages.map(() => "*")],
              body
            }
          }
        ]
      };

      pdfMake.createPdf(docDefinition).download("ahandil-designmodul.pdf");
    }

    function resetAll() {
      const confirmed = confirm(
        "Reset everything? This will remove saved edits, comments, approvals and language choices in this browser."
      );

      if (!confirmed) return;

      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(SETTINGS_KEY);

      data = getFreshData();
      settings = normalizeSettings();

      searchInput.value = "";
      statusFilter.value = "all";

      render();
    }

    stringsEl.addEventListener("input", (event) => {
      const target = event.target;
      const index = Number(target.dataset.index);

      if (!Number.isInteger(index) || !data[index]) return;

      if (target.dataset.action === "edit") {
        data[index].edited[target.dataset.lang] = target.value;
      }

      if (target.dataset.action === "comment") {
        data[index].comment = target.value;
      }

      saveData();
      updateCounts();
    });

    stringsEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action='toggle-status']");
      if (!button) return;

      const index = Number(button.dataset.index);
      if (!data[index]) return;

      data[index].status =
        data[index].status === "approved"
          ? "needs-review"
          : "approved";

      saveData();
      render();
    });

    languageChecks.addEventListener("change", (event) => {
      const target = event.target;

      if (target.type !== "checkbox") return;

      const code = target.value;
      let visibleLanguages = [...settings.visibleLanguages];

      if (target.checked && !visibleLanguages.includes(code)) {
        visibleLanguages.push(code);
      }

      if (!target.checked && visibleLanguages.includes(code)) {
        visibleLanguages = visibleLanguages.filter(languageCode => languageCode !== code);
      }

      if (!visibleLanguages.length) {
        target.checked = true;
        alert("Choose at least one language.");
        return;
      }

      settings = normalizeSettings({ visibleLanguages });
      saveSettings();
      render();
    });

    searchInput.addEventListener("input", render);
    statusFilter.addEventListener("change", render);

    byId("clearSearchButton").addEventListener("click", () => {
      searchInput.value = "";
      statusFilter.value = "all";
      render();
    });

    byId("excelButton").addEventListener("click", downloadExcel);
    byId("pdfButton").addEventListener("click", downloadPdf);

    byId("saveButton").addEventListener("click", () => {
      saveData();
      saveSettings();
      alert("Saved in this browser.");
    });

    byId("resetButton").addEventListener("click", resetAll);

    byId("progressButton").addEventListener("click", () => {
      byId("progressPanel").classList.toggle("visible");
    });

    byId("closeProgress").addEventListener("click", () => {
      byId("progressPanel").classList.remove("visible");
    });

    render();
  </script>
</body>
</html>
