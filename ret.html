    :root {
      --bg: #f4eee4;
      --card: #fffdfa;
      --green: #50af31;
      --green-dark: #3f8c27;
      --green-soft: #eef7ea;
      --red: #ef4b45;
      --text: #2f3133;
      --muted: #6c7176;
      --line: rgba(0,0,0,0.1);
      --shadow: 0 12px 28px rgba(0,0,0,0.08);
      --radius: 22px;
      font-family: "Open Sans", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #fbf7ef 0%, #f4edde 100%);
      color: var(--text);
      font-family: "Open Sans", Arial, sans-serif;
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 28px auto;
    }

    .hero {
      background: linear-gradient(135deg, rgba(80,175,49,0.98), rgba(55,124,36,0.96));
      color: white;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(50,90,40,0.18);
      display: grid;
      gap: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 2.45rem);
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: rgba(255,255,255,0.92);
      line-height: 1.55;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0;
      padding: 14px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: sticky;
      top: 10px;
      z-index: 20;
      backdrop-filter: blur(18px);
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    input[type="search"], select {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 11px 14px;
      min-height: 42px;
      font: inherit;
      color: var(--text);
    }

    input[type="search"] {
      width: min(360px, 100%);
    }

    button {
      border: 0;
      min-height: 42px;
      border-radius: 999px;
      padding: 10px 15px;
      background: var(--green);
      color: white;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }

    button.secondary {
      background: white;
      color: var(--green-dark);
      border: 1px solid rgba(63,140,39,0.22);
    }

    button.danger {
      background: var(--red);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--line);
      padding: 8px 12px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .string-card {
      background: var(--card);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .string-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.72);
    }

    .key {
      font-weight: 800;
      color: var(--green-dark);
    }

    .context {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1px;
      background: rgba(0,0,0,0.06);
    }

    .cell {
      background: var(--card);
      padding: 12px;
      min-height: 150px;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .cell label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .source-text {
      color: var(--text);
      line-height: 1.45;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid rgba(0,0,0,0.11);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      line-height: 1.45;
    }

    textarea:focus,
    input:focus,
    select:focus {
      outline: 3px solid rgba(80,175,49,0.18);
      border-color: rgba(80,175,49,0.55);
    }

    .status-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
      padding: 14px 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.58);
    }

    .status-row textarea {
      min-height: 70px;
    }

    .empty {
      display: none;
      text-align: center;
      padding: 34px;
      color: var(--muted);
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--line);
    }

    .empty.visible { display: block; }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .cell {
        min-height: auto;
      }

      .status-row {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .toolbar { display: none; }
      body { background: white; }
      .page { width: 100%; margin: 0; }
      .hero { box-shadow: none; }
      .string-card { break-inside: avoid; box-shadow: none; }
      textarea { border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Á handil · sprogtjek</h1>
      <p>Brug siden som et enkelt localization-værktøj: ret eller kommentér oversættelserne, filtrér efter sprog/status og download arbejdet som Excel eller PDF.</p>
    </section>

    <section class="toolbar" aria-label="Værktøjslinje">
      <div class="toolbar-left">
        <input id="searchInput" type="search" placeholder="Søg efter key, tekst eller kommentar…" />
        <select id="languageFilter" aria-label="Filtrér efter sprog">
          <option value="all">Alle sprog</option>
          <option value="da">Dansk</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="fo">Føroyskt</option>
          <option value="de">Deutsch</option>
        </select>
        <select id="statusFilter" aria-label="Filtrér efter status">
          <option value="all">Alle statusser</option>
          <option value="needs-review">Skal tjekkes</option>
          <option value="approved">Godkendt</option>
          <option value="issue">Har kommentar</option>
        </select>
      </div>

      <div class="toolbar-right">
        <button type="button" class="secondary" id="saveButton">Gem i browser</button>
        <button type="button" id="excelButton">Download Excel</button>
        <button type="button" id="pdfButton">Download PDF</button>
        <button type="button" class="danger" id="resetButton">Nulstil</button>
      </div>
    </section>

    <section class="meta" aria-live="polite">
      <span class="pill"><strong id="countVisible">0</strong> viste strenge</span>
      <span class="pill"><strong id="countApproved">0</strong> godkendt</span>
      <span class="pill"><strong id="countIssues">0</strong> med kommentar</span>
    </section>

    <section id="strings" class="layout"></section>
    <section id="empty" class="empty">Ingen strenge matcher filtreringen.</section>
  </main>

          da: "Mere information om butikken",
          en: "More information about the shop",
          fr: "Plus d’informations sur le magasin",
          fo: "Meira kunning um handilin",
          de: "Weitere Informationen über den Laden"
        }
      }
    ];

    function cloneData(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function getInitialData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch (error) {
          console.warn("Kunne ikke læse gemte data", error);
        }
      }

      return sourceStrings.map(item => ({
        ...cloneData(item),
        status: "needs-review",
        comment: "",
        edited: cloneData(item.text)
      }));
    }

    let data = getInitialData();

    const stringsEl = document.getElementById("strings");
    const emptyEl = document.getElementById("empty");
    const searchInput = document.getElementById("searchInput");
    const languageFilter = document.getElementById("languageFilter");
    const statusFilter = document.getElementById("statusFilter");
    const countVisible = document.getElementById("countVisible");
    const countApproved = document.getElementById("countApproved");
    const countIssues = document.getElementById("countIssues");

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getFilteredData() {
      const query = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      const lang = languageFilter.value;

      return data.filter(item => {
        const statusMatch = status === "all" || item.status === status || (status === "issue" && item.comment.trim());
        const haystackParts = [item.key, item.context, item.comment];

        languages.forEach(language => {
          if (lang === "all" || lang === language.code) {
            haystackParts.push(item.text[language.code] || "");
            haystackParts.push(item.edited[language.code] || "");
          }
        });

        const queryMatch = !query || haystackParts.join(" ").toLowerCase().includes(query);
        return statusMatch && queryMatch;
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      const filtered = getFilteredData();
      const chosenLanguage = languageFilter.value;

      stringsEl.innerHTML = filtered.map((item) => {
        const originalIndex = data.findIndex(row => row.key === item.key);
        const visibleLanguages = chosenLanguage === "all"
          ? languages
          : languages.filter(language => language.code === chosenLanguage);

        return `
          <article class="string-card" data-key="${escapeHtml(item.key)}">
            <div class="string-head">
              <div>
                <div class="key">${escapeHtml(item.key)}</div>
                <div class="context">${escapeHtml(item.context)}</div>
              </div>
              <select data-action="status" data-index="${originalIndex}" aria-label="Status for ${escapeHtml(item.key)}">
                <option value="needs-review" ${item.status === "needs-review" ? "selected" : ""}>Skal tjekkes</option>
                <option value="approved" ${item.status === "approved" ? "selected" : ""}>Godkendt</option>
              </select>
            </div>

            <div class="grid">
              ${visibleLanguages.map(language => `
                <div class="cell">
                  <label>
                    <span>${escapeHtml(language.label)}</span>
                    <span>${escapeHtml(language.code.toUpperCase())}</span>
                  </label>
                  <div class="source-text">${escapeHtml(item.text[language.code])}</div>
                  <textarea data-action="edit" data-index="${originalIndex}" data-lang="${language.code}" aria-label="Ret ${language.label} for ${escapeHtml(item.key)}">${escapeHtml(item.edited[language.code])}</textarea>
                </div>
              `).join("")}
            </div>

            <div class="status-row">
              <div>
                <strong>Kommentar</strong>
                <div class="context">Skriv fx “ok”, “lyder forkert”, “skal være mere høfligt” osv.</div>
              </div>
              <textarea data-action="comment" data-index="${originalIndex}" aria-label="Kommentar for ${escapeHtml(item.key)}">${escapeHtml(item.comment)}</textarea>
            </div>
          </article>
        `;
      }).join("");

      emptyEl.classList.toggle("visible", filtered.length === 0);
      countVisible.textContent = filtered.length;
      countApproved.textContent = data.filter(item => item.status === "approved").length;
      countIssues.textContent = data.filter(item => item.comment.trim()).length;
    }

    stringsEl.addEventListener("input", (event) => {
      const target = event.target;
      const index = Number(target.dataset.index);
      const action = target.dataset.action;
      if (!Number.isInteger(index) || !data[index]) return;

      if (action === "edit") {
        data[index].edited[target.dataset.lang] = target.value;
      }

      if (action === "comment") {
        data[index].comment = target.value;
      }

      saveData();
      updateCountsOnly();
    });

    stringsEl.addEventListener("change", (event) => {
      const target = event.target;
      const index = Number(target.dataset.index);
      if (target.dataset.action === "status" && data[index]) {
        data[index].status = target.value;
        saveData();
        render();
      }
    });

    function updateCountsOnly() {
      countApproved.textContent = data.filter(item => item.status === "approved").length;
      countIssues.textContent = data.filter(item => item.comment.trim()).length;
    }

    function rowsForExport() {
      return data.map(item => ({
        key: item.key,
        context: item.context,
        status: item.status,
        comment: item.comment,
        da_original: item.text.da,
        da_reviewed: item.edited.da,
        en_original: item.text.en,
        en_reviewed: item.edited.en,
        fr_original: item.text.fr,
        fr_reviewed: item.edited.fr,
        fo_original: item.text.fo,
        fo_reviewed: item.edited.fo,
        de_original: item.text.de,
        de_reviewed: item.edited.de
      }));
    }

    function downloadExcel() {
      const worksheet = XLSX.utils.json_to_sheet(rowsForExport());
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Sprogtjek");
      XLSX.writeFile(workbook, "ahandil-sprogtjek.xlsx");
    }

    function downloadPdf() {
      const body = [
        [
          { text: "Key", bold: true },
          { text: "Status", bold: true },
          { text: "Kommentar", bold: true },
          { text: "DA", bold: true },
          { text: "EN", bold: true },
          { text: "FR", bold: true },
          { text: "FO", bold: true },
          { text: "DE", bold: true }
        ],
        ...data.map(item => [
          item.key,
          item.status,
          item.comment || "",
          item.edited.da || "",
          item.edited.en || "",
          item.edited.fr || "",
          item.edited.fo || "",
          item.edited.de || ""
        ])
      ];

      const docDefinition = {
        pageOrientation: "landscape",
        pageSize: "A4",
        pageMargins: [24, 28, 24, 28],
        defaultStyle: {
          font: "Roboto",
          fontSize: 7
        },
        content: [
          { text: "Á handil · sprogtjek", fontSize: 16, bold: true, margin: [0, 0, 0, 4] },
          { text: `Eksporteret: ${new Date().toLocaleString("da-DK")}`, fontSize: 8, margin: [0, 0, 0, 12] },
          {
            table: {
              headerRows: 1,
              widths: [70, 55, 105, "*", "*", "*", "*", "*"],
              body
            },
            layout: {
              fillColor: function (rowIndex) {
                return rowIndex === 0 ? "#eef7ea" : null;
              },
              hLineColor: function () { return "#dddddd"; },
              vLineColor: function () { return "#dddddd"; }
            }
          }
        ]
      };

      pdfMake.createPdf(docDefinition).download("ahandil-sprogtjek.pdf");
    }

    searchInput.addEventListener("input", render);
    languageFilter.addEventListener("change", render);
    statusFilter.addEventListener("change", render);

    document.getElementById("saveButton").addEventListener("click", () => {
      saveData();
      alert("Gemt i denne browser.");
    });

    document.getElementById("excelButton").addEventListener("click", downloadExcel);
    document.getElementById("pdfButton").addEventListener("click", downloadPdf);

    document.getElementById("resetButton").addEventListener("click", () => {
      if (!confirm("Vil du nulstille alle rettelser og kommentarer?")) return;
      localStorage.removeItem(STORAGE_KEY);
      data = getInitialData();
      render();
    });

    render();
  </script>
</body>
</html>
